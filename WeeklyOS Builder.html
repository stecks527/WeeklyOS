    function saveModal() {
      if (
        typeof modalSaveHandler ===
        "function"
      ) {
        modalSaveHandler();
      }
    }


    /*************************************************
     * FORM BUILDERS
     *************************************************/

    function buildTextField(
      label,
      id,
      value,
      fullWidth
    ) {
      return (
        '<div class="form-field ' +
          (
            fullWidth
              ? "full"
              : ""
          ) +
        '">' +
          '<label class="form-label" for="' +
            id +
          '">' +
            escapeHtml(label) +
          "</label>" +

          '<input type="text" id="' +
            id +
          '" value="' +
            escapeAttribute(
              value ||
              ""
            ) +
          '">' +
        "</div>"
      );
    }


    function buildTextareaField(
      label,
      id,
      value
    ) {
      return (
        '<div class="form-field full">' +
          '<label class="form-label" for="' +
            id +
          '">' +
            escapeHtml(label) +
          "</label>" +

          '<textarea id="' +
            id +
          '">' +
            escapeHtml(
              value ||
              ""
            ) +
          "</textarea>" +
        "</div>"
      );
    }


    function buildSelectField(
      label,
      id,
      options,
      selectedValue
    ) {
      const optionHtml =
        (
          options ||
          []
        ).map(
          function (option) {
            return (
              '<option value="' +
                escapeAttribute(
                  option.value
                ) +
              '"' +
              (
                option.value ===
                selectedValue
                  ? " selected"
                  : ""
              ) +
              ">" +
                escapeHtml(
                  option.label
                ) +
              "</option>"
            );
          }
        ).join("");

      return (
        '<div class="form-field">' +
          '<label class="form-label" for="' +
            id +
          '">' +
            escapeHtml(label) +
          "</label>" +

          '<select id="' +
            id +
          '">' +
            optionHtml +
          "</select>" +
        "</div>"
      );
    }


    /*************************************************
     * UTILITIES
     *************************************************/

    function valueOf(
      id
    ) {
      const element =
        document.getElementById(
          id
        );

      return element
        ? String(
            element.value ||
            ""
          ).trim()
        : "";
    }


    function checkedOf(
      id
    ) {
      const element =
        document.getElementById(
          id
        );

      return Boolean(
        element &&
        element.checked
      );
    }


    function splitList(
      value
    ) {
      return String(
        value ||
        ""
      )
        .split(",")
        .map(
          function (item) {
            return item.trim();
          }
        )
        .filter(Boolean);
    }


    function createClientId() {
      if (
        window.crypto &&
        typeof window.crypto
          .randomUUID ===
          "function"
      ) {
        return window.crypto
          .randomUUID();
      }

      return (
        "CLIENT_" +
        Date.now() +
        "_" +
        Math.random()
          .toString(36)
          .slice(2)
      );
    }


    function deepClone(
      value
    ) {
      return JSON.parse(
        JSON.stringify(
          value
        )
      );
    }


    function statusBadgeClass(
      value
    ) {
      const normalized =
        String(
          value ||
          ""
        ).toUpperCase();

      if (
        normalized ===
        "READY"
      ) {
        return "ready";
      }

      if (
        normalized ===
          "NEEDS_REVIEW" ||
        normalized ===
          "UNREVIEWED"
      ) {
        return "review";
      }

      if (
        normalized.indexOf(
          "ERROR"
        ) >= 0
      ) {
        return "error";
      }

      return "info";
    }


    function formatLabel(
      value
    ) {
      return String(
        value ||
        ""
      )
        .toLowerCase()
        .replace(
          /_/g,
          " "
        )
        .replace(
          /\b\w/g,
          function (
            character
          ) {
            return character
              .toUpperCase();
          }
        );
    }


    function formatDateLabel(
      value
    ) {
      if (!value) {
        return "";
      }

      const parts =
        String(value)
          .split("-");

      if (
        parts.length === 3
      ) {
        const date =
          new Date(
            Number(parts[0]),
            Number(parts[1]) - 1,
            Number(parts[2])
          );

        return date
          .toLocaleDateString(
            undefined,
            {
              month: "short",
              day: "numeric",
              year: "numeric"
            }
          );
      }

      return String(value);
    }


    function formatDateTime(
      value
    ) {
      if (!value) {
        return "";
      }

      const date =
        new Date(value);

      if (
        isNaN(
          date.getTime()
        )
      ) {
        return String(value);
      }

      return date
        .toLocaleString();
    }


    function escapeHtml(
      value
    ) {
      return String(
        value == null
          ? ""
          : value
      )
        .replace(
          /&/g,
          "&amp;"
        )
        .replace(
          /</g,
          "&lt;"
        )
        .replace(
          />/g,
          "&gt;"
        )
        .replace(
          /"/g,
          "&quot;"
        )
        .replace(
          /'/g,
          "&#039;"
        );
    }


    function escapeAttribute(
      value
    ) {
      return escapeHtml(
        value
      )
        .replace(
          /`/g,
          "&#096;"
        );
    }


    function setFooterStatus(
      message
    ) {
      document.getElementById(
        "footerStatus"
      ).textContent =
        message || "";
    }


    function setLoading(
      visible,
      message
    ) {
      const overlay =
        document.getElementById(
          "loadingOverlay"
        );

      overlay.classList.toggle(
        "visible",
        Boolean(visible)
      );

      if (
        message
      ) {
        document.getElementById(
          "loadingMessage"
        ).textContent =
          message;
      }
    }


    function handleFailure(
      error
    ) {
      setLoading(
        false
      );

      const message =
        error &&
        error.message
          ? error.message
          : String(error);

      setFooterStatus(
        "Error: " +
        message
      );

      alert(message);
    }
  </script>
